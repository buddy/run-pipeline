name: Edge Cases Testing

on: [push, pull_request, workflow_dispatch]

jobs:
  edge-cases:
    name: Test Edge Cases
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Buddy
        uses: buddy/login@v1
        with:
          token: ${{ secrets.TOKEN }}

      - name: Setup BDY CLI
        uses: buddy/setup@v1
        with:
          env: 'dev'
          installation_method: 'npm'

      - name: Test invalid priority
        continue-on-error: true
        uses: ./
        with:
          workspace: buddy-workshop-devs
          project: ttttesty
          identifier: a1
          priority: SUPER_HIGH

      - name: Test invalid no-wait value
        continue-on-error: true
        uses: ./
        with:
          workspace: buddy-workshop-devs
          project: ttttesty
          identifier: a1
          no-wait: not-a-boolean

      - name: Test variable without colon
        continue-on-error: true
        uses: ./
        with:
          workspace: buddy-workshop-devs
          project: ttttesty
          identifier: a1
          variable: |
            validkey:validvalue
            invalidvariablewithoutcolon
            anotherkey:anothervalue

      - name: Test variable with many colons
        continue-on-error: true
        uses: ./
        with:
          workspace: buddy-workshop-devs
          project: ttttesty
          identifier: a1
          variable: 'key:value:with:many:colons::::::'

      - name: Test non-existing workspace
        continue-on-error: true
        uses: ./
        with:
          workspace: this-workspace-does-not-exist-12345
          project: ttttesty
          identifier: a1

      - name: Test non-existing project
        continue-on-error: true
        uses: ./
        with:
          workspace: buddy-workshop-devs
          project: this-project-does-not-exist-12345
          identifier: a1

      - name: Test non-existing branch
        continue-on-error: true
        uses: ./
        with:
          workspace: buddy-workshop-devs
          project: ttttesty
          identifier: a1
          branch: non-existing-branch-xyz-12345

      - name: Test non-existing action ID
        continue-on-error: true
        uses: ./
        with:
          workspace: buddy-workshop-devs
          project: ttttesty
          identifier: action-pick
          action: 99999999

      - name: Test invalid schedule format
        continue-on-error: true
        uses: ./
        with:
          workspace: buddy-workshop-devs
          project: ttttesty
          identifier: a1
          schedule: invalid-schedule-format

      - name: Test comment with markdown
        uses: ./
        with:
          workspace: buddy-workshop-devs
          project: ttttesty
          identifier: a1
          branch: master
          comment: |
            # Test Comment with Markdown

            - **Bold text**
            - *Italic text*
            - `code block`

            ## Subsection

            This should work fine!

      - name: Test non-boolean refresh/clear-cache
        uses: ./
        with:
          workspace: buddy-workshop-devs
          project: ttttesty
          identifier: a1
          branch: master
          comment: 'Testing non-boolean values - should be treated as false'
          refresh: yes
          clear-cache: 1
